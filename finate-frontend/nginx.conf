server {
    listen 80;

    # Serve React app for all non-API routes
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # This is critical for React Router.
        # Without it, refreshing /dashboard gives a 404
        # because Nginx looks for a real file called "dashboard".
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to Spring Boot
    location /api/ {
        proxy_pass http://backend:8080/api/;

        # Pass real client IP to Spring Boot
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket support (we have live price broadcasting)
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;

        # These two headers are what "upgrade" HTTP to WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
    }
}