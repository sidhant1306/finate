version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: finate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finate_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finate_redis
    restart: unless-stopped
    networks:
      - finate_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./finate-backend
      dockerfile: Dockerfile
    container_name: finate_backend_container
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    # NO environment: block — env_file handles everything.
    # Your application.properties reads DATABASE_URL, REDIS_HOST,
    # JWT_SECRET_KEY etc. directly by those exact names from .env
    networks:
      - finate_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./finate-frontend
      dockerfile: Dockerfile
    container_name: finate_frontend_container
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - finate_net

volumes:
  postgres_data:

networks:
  finate_net:
    driver: bridge
